<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men's Wardrobe</title>
<style>
  /* 기본 스타일 */
  body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; margin: 0; color: #212529; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background-color: #ffffff; border-bottom: 1px solid #eaecef; }
  .logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  
  /* 공통 버튼 스타일 */
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
  .btn-black { background-color: #1a1a1a; color: white; }
  .btn-outline { background-color: white; border: 1px solid #dee2e6; color: #495057; }
  .btn-outline:hover { background-color: #f8f9fa; }

  /* 메인 화면 (사용자용) */
  #mainView { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 32px; }
  
  /* 카드 전체 래퍼 (상대 위치 지정용) */
  .card-wrapper { position: relative; display: block; }
  
  /* 메인 카드 디자인 */
  .card { 
    background-color: #ffffff; 
    border: 1px solid #f1f3f5; 
    border-radius: 16px; 
    padding: 24px; 
    text-decoration: none; 
    color: inherit; 
    display: flex; 
    flex-direction: column; 
    height: 100%;
    box-sizing: border-box;
    transition: transform 0.2s ease, box-shadow 0.2s ease; 
  }
  .card-wrapper:hover .card { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.06); }
  
  /* 썸네일/로고 영역 컨테이너 */
  .card-icon { 
    width: 48px; 
    height: 48px; 
    background-color: #ffffff; /* 로고의 흰색 배경과 이질감이 없도록 순백색으로 변경 */
    border-radius: 12px; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    font-weight: 700; 
    margin-bottom: 16px; 
    overflow: hidden; 
    border: 1px solid #e9ecef;
  }
  
  /* 로고 이미지 자체의 스타일 */
  .card-icon img { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; /* 핵심! cover(꽉 채움) -> contain(비율 유지하며 안에 맞춤)으로 변경 */
    padding: 6px; /* 로고가 테두리에 너무 바짝 붙지 않도록 숨통(여백) 틔워주기 */
    box-sizing: border-box; /* 패딩을 포함해서 전체 크기를 100%로 계산하도록 설정 */
  }
  .card-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
  
  /* 사용자용 핀 버튼 (카드 우측 상단) */
  .pin-toggle-btn { 
    position: absolute; 
    top: 20px; 
    right: 20px; 
    background: none; 
    border: none; 
    font-size: 18px; 
    cursor: pointer; 
    z-index: 10; /* 카드 링크보다 위에 오도록 설정 */
    opacity: 0.2; /* 기본은 흐리게 */
    transition: opacity 0.2s, transform 0.1s; 
  }
  .pin-toggle-btn:hover { opacity: 0.6; transform: scale(1.1); }
  .pin-toggle-btn.active { opacity: 1; color: #ff2b2b; } /* 활성화 시 빨간색 핀 */

  /* 관리자 화면 */
  #adminView { display: none; max-width: 800px; margin: 40px auto; padding: 0 20px; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .admin-list { background: white; border-radius: 16px; border: 1px solid #eaecef; padding: 20px; }
  .admin-item { border-bottom: 1px solid #f1f3f5; padding: 20px 0; position: relative; }
  .admin-item:last-child { border-bottom: none; }
  .admin-item-top { display: flex; justify-content: flex-end; margin-bottom: 16px; }
  .delete-btn { cursor: pointer; color: #adb5bd; border: none; background: none; font-size: 14px; }
  .delete-btn:hover { color: #ff6b6b; }
  .input-group-row { display: flex; gap: 16px; }
  .input-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .input-box label { font-size: 12px; color: #868e96; }
  .input-box input { padding: 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
</style>
</head>
<body>

  <header class="header">
    <div class="logo">👕 Shopping Easy </div>
    <div id="adminBtn" style="cursor: pointer; color: #868e96; font-size: 14px;">⚙️ 관리</div>
  </header>

  <main id="mainView">
    <h1 style="margin-bottom: 8px;">Curated Stores</h1>
    <p style="color: #868e96; margin-top: 0;">원하는 스타일의 샵을 쉽게 찾아보세요.</p>
    <div class="store-grid" id="storeGrid"></div>
  </main>

  <main id="adminView">
    <div class="admin-header">
      <div>
        <h2 style="margin:0 0 8px 0;">스토어 관리</h2>
        <p style="margin:0; color: #868e96; font-size: 14px;">쇼핑몰 정보를 추가, 수정, 삭제할 수 있습니다.</p>
      </div>
      <div>
        <button class="btn btn-outline" id="backBtn">← 메인으로</button>
        <button class="btn btn-black" onclick="addNewStore()">+ 추가하기</button>
      </div>
    </div>
    <div class="admin-list" id="adminList"></div>
  </main>

<script>
  // 초기 데이터
  const defaultStores = [
    { id: 1, name: "디아더사이드", url: "https://the-otherside.co.kr/", logo: "https://play-lh.googleusercontent.com/l8fxFE1EdO4q4HYCb9jxs-Q0za1vQMZwUtmRsoPDdAUISeI1S1B6EaOj84eFC_Uh-0k", pinned: true },
    { id: 2, name: "벨리에", url: "https://belier.co.kr/", logo: "https://belier.co.kr/web/upload/share-image-1-21530d4a45f115a3d063a58ae2de0909.jpg", pinned: false },
    { id: 3, name: "온더룩", url: "https://onthelook.co.kr/", logo: "https://images.onthelook.co.kr/icon.png", pinned: false },
    { id: 3, name: "무드인사이드", url: "https://mood-inside.co.kr/", logo: "https://mood-inside.co.kr/web/upload/images/logo0.png", pinned: false },
    { id: 3, name: "젠틀서울", url: "https://m.gentleseoul.com/", logo: "https://images.onthelook.co.kr/b/tPTzs6WeBveUEezhW7ofRp.png", pinned: false },
    { id: 3, name: "락커룸", url: "https://locker-room.co.kr/", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT21H2OOx-kce7eLYI9dyXeEizMYe1KhoQgfg&s", pinned: false },
    { id: 3, name: "센지니어", url: "https://cengineer.co.kr/", logo: "https://m.cengineer.co.kr/file_data/cengineer/2023/04/19/4eabb26f29d15fab4a30f4c9cac53b44.jpg", pinned: false },
    { id: 3, name: "큐쓰(qss)", url: "https://qss.seoul.kr/", logo: "https://qss.seoul.kr/web/upload/momoi/logo.png", pinned: false },
    { id: 3, name: "크림", url: "https://kream.co.kr/", logo: "https://i.namu.wiki/i/ahYIn0vc-6N9hA1hLYCbu-iZLFOwzSVBvBhImNG_Y0SDkBDH6Ri-gApsE6LWRwqPA0IIvOGmEW3HROEEChbMww.webp", pinned: false },
    { id: 3, name: "무신사", url: "https://www.musinsa.com/", logo: "https://image.msscdn.net/static/assets/bi/og/og_musinsa.png", pinned: false }.
    
    
  ];

  let stores = JSON.parse(localStorage.getItem('myStores')) || defaultStores;

  function saveData() {
    localStorage.setItem('myStores', JSON.stringify(stores));
    if(document.getElementById('mainView').style.display !== 'none') {
      renderMain();
    } else {
      renderAdmin();
    }
  }

  // 화면 전환 로직
  const mainView = document.getElementById('mainView');
  const adminView = document.getElementById('adminView');
  
  document.getElementById('adminBtn').addEventListener('click', () => {
    const pw = prompt("관리자 공간이에요!");
    if (pw === "8988") {
      mainView.style.display = 'none';
      adminView.style.display = 'block';
      renderAdmin();
    } else if (pw !== null) {
      alert("try again");
    }
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    adminView.style.display = 'none';
    mainView.style.display = 'block';
    renderMain();
  });

  // 메인 화면 렌더링 (사용자)
  function renderMain() {
    const grid = document.getElementById('storeGrid');
    grid.innerHTML = '';
    
    // 핀 고정된 쇼핑몰이 위로 오도록 정렬
    const sortedStores = [...stores].sort((a, b) => b.pinned - a.pinned);

    sortedStores.forEach(store => {
      const initial = store.name.charAt(0).toUpperCase();
      const logoHtml = store.logo ? `<img src="${store.logo}" alt="logo">` : initial;
      
      // 긴 URL 제거, 핀 버튼 추가
      const cardHTML = `
        <div class="card-wrapper">
          <button class="pin-toggle-btn ${store.pinned ? 'active' : ''}" onclick="togglePinMain(event, ${store.id})">
            📌
          </button>
          <a href="https://${store.url.replace(/^https?:\/\//,'')}" target="_blank" class="card">
            <div class="card-icon">${logoHtml}</div>
            <div class="card-title">${store.name}</div>
          </a>
        </div>
      `;
      grid.insertAdjacentHTML('beforeend', cardHTML);
    });
  }

  // 사용자 화면에서 핀 토글
  function togglePinMain(event, id) {
    event.preventDefault(); // 링크 이동 방지
    event.stopPropagation(); // 이벤트 버블링 방지
    
    const store = stores.find(s => s.id === id);
    if (store) {
      store.pinned = !store.pinned;
      saveData();
    }
  }

  // 관리자 화면 렌더링
  function renderAdmin() {
    const list = document.getElementById('adminList');
    list.innerHTML = '';

    stores.forEach((store) => {
      // 관리자 화면에서는 핀 버튼 제거
      const item = `
        <div class="admin-item">
          <div class="admin-item-top">
            <button class="delete-btn" onclick="deleteStore(${store.id})">🗑 삭제</button>
          </div>
          <div class="input-group-row">
            <div class="input-box">
              <label>이름</label>
              <input type="text" value="${store.name}" onchange="updateStore(${store.id}, 'name', this.value)">
            </div>
            <div class="input-box">
              <label>링크 URL</label>
              <input type="text" value="${store.url}" onchange="updateStore(${store.id}, 'url', this.value)">
            </div>
            <div class="input-box">
              <label>로고 이미지 URL</label>
              <input type="text" value="${store.logo}" placeholder="이미지 주소 붙여넣기" onchange="updateStore(${store.id}, 'logo', this.value)">
            </div>
          </div>
        </div>
      `;
      list.insertAdjacentHTML('beforeend', item);
    });
  }

  // 관리자 기능 액션
  function addNewStore() {
    const newStore = { id: Date.now(), name: "새 스토어", url: "", logo: "", pinned: false };
    stores.unshift(newStore); 
    saveData();
  }

  function updateStore(id, field, value) {
    const store = stores.find(s => s.id === id);
    if (store) {
      store[field] = value;
      saveData();
    }
  }

  function deleteStore(id) {
    if(confirm("삭제할까?")) {
      stores = stores.filter(s => s.id !== id);
      saveData();
    }
  }

  // 초기 실행
  renderMain();
</script>
</body>
</html>
